<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استضافة الملفات — تمام للتقنية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* شريط تنقل صغير */
        .topbar {
            background: #111;
            color: #d4af37;
            text-align: center;
            padding: 10px;
            font-size: 1.1em;
            font-weight: bold;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
            z-index: 10;
        }
        .topbar a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 10px;
        }
        iframe {
            width: 100%;
            height: calc(100% - 45px);
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="https://tmmamtech.xyz">🏠 الرئيسية</a> |
        <a href="https://blog.tmmamtech.xyz">📰 المدونة</a> |
        ☁️ استضافة الملفات
    </div>
    <iframe src="https://tmmamfiles.byethost9.com" title="استضافة الملفات"></iframe>
</body>
</html>
