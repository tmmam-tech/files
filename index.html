<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استضافة الملفات — تمام للتقنية</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; background:#0a0a0a; }
        .topbar {
            background:#111; color:#d4af37; text-align:center;
            padding:10px; font-size:1em; font-weight:bold;
            border-bottom:1px solid #2a2a2a; z-index:10; position:relative;
        }
        .topbar a { color:#d4af37; text-decoration:none; margin:0 5px; }
        iframe { width:100%; height:calc(100% - 45px); border:none; display:block; }
        /* زر للجوال */
        .fallback {
            display: none; /* مخفي افتراضياً */
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index:20;
        }
        .fallback a {
            display: inline-block; background:#d4af37; color:#0a0a0a;
            padding: 15px 30px; border-radius: 30px; text-decoration: none;
            font-weight: bold; font-size:1.2em; margin-top:20px;
        }
        /* يظهر على الجوال (شاشات أقل من 768px) */
        @media (max-width: 768px) {
            iframe { display: none; } /* نخفي الإيفريم */
            .fallback { display: block; } /* نظهر البديل */
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="https://tmmamtech.xyz">🏠 الرئيسية</a> |
        <a href="https://blog.tmmamtech.xyz">📰 المدونة</a> |
        ☁️ استضافة الملفات
    </div>

    <!-- محاولة الإيفريم -->
    <iframe src="https://tmmamfiles.infinityfreeapp.com" title="استضافة الملفات"></iframe>

    <!-- بديل أنيق للجوال أو عند فشل الإيفريم -->
    <div class="fallback">
        <p style="color:#fff; font-size:1.2em;">📂 للوصول إلى استضافة الملفات</p>
        <a href="https://tmmamfiles.infinityfreeapp.com" target="_blank">افتح الموقع الآن 🚀</a>
        <p style="color:#888; margin-top:15px; font-size:0.9em;">(يمكنك إغلاق التبويب للعودة)</p>
    </div>
</body>
</html>
