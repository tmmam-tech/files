<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استضافة الملفات — تمام للتقنية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #f1f1f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        nav a:hover { color: #d4af37; border-bottom: 2px solid #d4af37; }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #d4af37;
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
            margin-bottom: 25px;
            object-fit: cover;
        }
        h1 { color: #d4af37; margin-bottom: 10px; font-size: 2em; }
        p { color: #b0b0b0; margin-bottom: 30px; font-size: 1.1em; max-width: 500px; }
        .btn {
            display: inline-block;
            background: #d4af37;
            color: #0a0a0a;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: 0.3s;
        }
        .btn:hover { background: #e0c04a; transform: scale(1.03); }
        .footer {
            margin: 20px;
            color: #666;
            font-size: 0.85em;
        }
        .footer span { color: #d4af37; }
    </style>
</head>
<body>
    <nav>
        <a href="https://tmmamtech.xyz">🏠 الرئيسية</a>
        <a href="https://blog.tmmamtech.xyz">📰 المدونة</a>
        <a href="https://tmmamtech.xyz/about.html">👤 من أنا؟</a>
    </nav>

    <div class="content">
        <img src="https://tmmam-tech.github.io/tech-logo.png" alt="شعار تمام للتقنية" class="logo">
        <h1>استضافة الملفات</h1>
        <p>مرحباً بك في خدمة استضافة الملفات من تمام للتقنية. لرفع وتحميل الملفات، اضغط على الزر أدناه.</p>
        <a href="https://tmmamfiles.infinityfreeapp.com" target="_blank" class="btn">📂 افتح استضافة الملفات</a>
    </div>
</body>
